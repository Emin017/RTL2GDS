name: "Build and check RTL2GDS"
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-designs:
    name: test RTL2GDS - ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: gcd
            config_file: gcd.yaml
            dir: gcd
          - name: picorv32a
            config_file: pico.yaml
            dir: picorv32a
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip3 install pyyaml orjson klayout
          nix shell nixpkgs#ieda --run "echo 'ieda environment set up'"
          nix shell nixpkgs#yosys --run "echo 'yosys environment set up'"
      - name: Run ${{ matrix.name }} flows
        run: |
          export PYTHONPATH=$(pwd)/src
          cd design_zoo/${{ matrix.dir }}
          python3 -m rtl2gds -c ${{ matrix.config_file }}
